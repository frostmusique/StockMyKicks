<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StockMyKicks">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>StockMyKicks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding-top: env(safe-area-inset-top); }
        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s; }
        .glass:active { transform: scale(0.98); }
        .btn-gradient { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-end mb-8 mt-6">
        <div>
            <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Portfolio</p>
            <h1 class="text-3xl font-black italic tracking-tighter">StockMyKicks</h1>
        </div>
        <div id="total-val" class="text-right">
            <p class="text-[10px] text-gray-500 uppercase font-bold">Valeur Estimée</p>
            <p class="text-2xl font-black text-white">0 €</p>
        </div>
    </header>

    <div id="inventory" class="space-y-4">
        </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 p-6 flex flex-col justify-center animate-in fade-in duration-300">
        <h2 class="text-3xl font-black mb-6 italic">NEW DROP</h2>
        <div class="space-y-4">
            <input type="text" id="m-name" placeholder="Modèle (ex: J1 Travis Scott)" class="bg-white/10 p-5 rounded-2xl w-full outline-none focus:ring-2 ring-blue-500">
            <div class="flex gap-2">
                <input type="text" id="m-size" placeholder="Taille" class="bg-white/10 p-5 rounded-2xl w-1/2 outline-none">
                <input type="number" id="m-buy" placeholder="Prix Achat" class="bg-white/10 p-5 rounded-2xl w-1/2 outline-none">
            </div>
            <input type="number" id="m-market" placeholder="Cote Actuelle (€)" class="bg-white/10 p-5 rounded-2xl w-full outline-none">
        </div>
        <button onclick="saveNewPair()" class="btn-gradient mt-8 p-5 rounded-2xl font-black text-lg shadow-lg shadow-blue-500/20">AJOUTER AU STOCK</button>
        <button onclick="toggleModal()" class="mt-6 text-gray-500 font-bold uppercase text-xs tracking-widest">Fermer</button>
    </div>

    <button onclick="toggleModal()" class="fixed bottom-10 left-1/2 -translate-x-1/2 btn-gradient px-10 py-5 rounded-2xl shadow-2xl font-black italic text-sm flex items-center gap-3">
        ADD TO STOCK
    </button>

    <script>
        let myKicks = JSON.parse(localStorage.getItem('stockMyKicksData')) || [];

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        function saveNewPair() {
            const name = document.getElementById('m-name').value;
            if(!name) return alert('Donne au moins un nom !');

            const pair = {
                id: Date.now(),
                name: name,
                size: document.getElementById('m-size').value || 'N/A',
                buy: parseFloat(document.getElementById('m-buy').value) || 0,
                market: parseFloat(document.getElementById('m-market').value) || 0,
                date: new Date().toLocaleDateString('fr-FR')
            };
            
            myKicks.push(pair);
            localStorage.setItem('stockMyKicksData', JSON.stringify(myKicks));
            toggleModal();
            render();
            
            document.getElementById('m-name').value = '';
            document.getElementById('m-buy').value = '';
        }

        function deletePair(id) {
            if(confirm('Retirer cette paire du stock ?')) {
                myKicks = myKicks.filter(p => p.id !== id);
                localStorage.setItem('stockMyKicksData', JSON.stringify(myKicks));
                render();
            }
        }

        function render() {
            const container = document.getElementById('inventory');
            let total = 0;
            
            if(myKicks.length === 0) {
                container.innerHTML = `<div class="mt-20 text-center opacity-30 font-bold italic text-xl">EMPTY STOCK</div>`;
                document.getElementById('total-val').innerHTML = `<p class="text-[10px] text-gray-500 uppercase font-bold">Valeur Estimée</p><p class="text-2xl font-black text-white">0 €</p>`;
                return;
            }

            container.innerHTML = myKicks.map(k => {
                total += k.market;
                const profit = k.market - k.buy;
                return `
                    <div class="glass p-5 flex justify-between items-center" onclick="deletePair(${k.id})">
                        <div>
                            <h3 class="font-black italic text-lg uppercase leading-none">${k.name}</h3>
                            <p class="text-gray-500 text-[10px] font-bold mt-1 uppercase">Size ${k.size} • Copped on ${k.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black italic">${k.market}€</p>
                            <p class="text-[10px] ${profit >= 0 ? 'text-green-400' : 'text-red-500'} font-black uppercase">
                                ${profit >= 0 ? '▲' : '▼'} ${Math.abs(profit)}€
                            </p>
                        </div>
                    </div>
                `;
            }).reverse().join('');
            
            document.getElementById('total-val').innerHTML = `
                <p class="text-[10px] text-gray-500 uppercase font-bold">Valeur Estimée</p>
                <p class="text-2xl font-black text-white">${total} €</p>
            `;
        }

        render();
    </script>
</body>
</html>
